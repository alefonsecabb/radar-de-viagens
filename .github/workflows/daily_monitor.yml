name: Daily Travel Deals Monitor

on:
  schedule:
    - cron: '0 6 * * *'    # 06:00 UTC = 03:00 BRT, todo dia
  workflow_dispatch:         # Permite disparo manual pela UI do GitHub

permissions:
  contents: write            # Necessário para git push dos JSONs

jobs:
  monitor:
    runs-on: ubuntu-22.04
    timeout-minutes: 45      # Playwright + múltiplos sites pode demorar

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Instalar Playwright (Chromium)
        run: playwright install chromium --with-deps

      - name: Executar monitor
        env:
          KIWI_API_KEY:          ${{ secrets.KIWI_API_KEY }}
          GMAIL_USER:            ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:    ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL:       alefonsecabb@gmail.com
          RUN_ENV:               github_actions
        run: python main.py

      - name: Configurar git para push
        if: always()
        run: |
          git config user.name  "Travel Monitor Bot"
          git config user.email "actions@github.com"

      - name: Commit e push dos dados atualizados
        if: always()
        run: |
          git add data/ docs/data/
          git diff --staged --quiet || git commit -m "chore: update travel data $(date -u +%Y-%m-%d) [skip ci]"
          git push
